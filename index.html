<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f7f9fa;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 450px;
            height: 520px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e1e8ed;
            transition: all 0.2s ease; /* Transición suave por si acaso */
        }
        /* Cabecera del Chivato Visual */
        .chat-header {
            background: #f8f9fa;
            padding: 12px 20px;
            border-bottom: 1px solid #e1e8ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header-title {
            font-weight: bold;
            color: #14171a;
            font-size: 16px;
        }
        .model-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            font-size: 15px;
            line-height: 1.4;
        }
        .user-message {
            background-color: #3b82f6;
            color: #ffffff;
            align-self: flex-end;
            border-radius: 16px 16px 4px 16px;
        }
        .ai-message {
            background-color: #f1f3f4;
            color: #14171a;
            align-self: flex-start;
            border-radius: 16px 16px 16px 4px;
        }
        .system-message {
            background-color: #fee2e2;
            color: #ef4444;
            align-self: center;
            border-radius: 8px;
            font-size: 13px;
            padding: 8px 12px;
        }
        .input-group {
            padding: 15px;
            border-top: 1px solid #e1e8ed;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #e1e8ed;
            border-radius: 24px;
            outline: none;
        }
        .send-btn {
            background-color: #3b82f6;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
            transform: rotate(45deg);
            margin-left: -2px;
            margin-top: 2px;
        }

        /* 🌐 ESTILOS ADAPTATIVOS PARA EL MODO EMBED (?embed) */
        body.embed-mode {
            background-color: #ffffff;
        }
        body.embed-mode .chat-container {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100% !important;
            max-height: 100% !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            border: none !important;
        }

        /* RENDERIZADO AVANZADO DE MARKDOWN */
        .ai-message p { margin: 0 0 8px 0; }
        .ai-message p:last-child { margin-bottom: 0; }
        .ai-message ul { margin: 4px 0; padding-left: 20px; list-style-type: disc; }
        .ai-message li { margin-bottom: 4px; }
       
        .ai-message h1, .ai-message h2, .ai-message h3,
        .ai-message h4, .ai-message h5, .ai-message h6 {
            margin: 12px 0 6px 0;
            font-weight: bold;
            line-height: 1.2;
        }
        .ai-message h1 { font-size: 1.35em; border-bottom: 1px solid #e1e8ed; padding-bottom: 4px; }
        .ai-message h2 { font-size: 1.25em; }
        .ai-message h3 { font-size: 1.15em; }
        .ai-message h4 { font-size: 1.05em; }
        .ai-message h5 { font-size: 0.95em; }
        .ai-message h6 { font-size: 0.85em; color: #657786; }

        .ai-message code { font-family: "SFMono-Regular", Consolas, monospace; background-color: rgba(27,31,35,0.08); color: #c7254e; padding: 2px 4px; border-radius: 4px; font-size: 0.9em; }
        .ai-message .chat-link { color: #2563eb; text-decoration: underline; font-weight: 500; }
        .ai-message .chat-link:hover { color: #1d4ed8; }
        .ai-message .chat-img { max-width: 100%; height: auto; border-radius: 8px; margin: 6px 0; display: block; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .code-block-container { margin: 10px 0; border-radius: 8px; overflow: hidden; border: 1px solid #2d2d2d; background-color: #1e1e1e; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .code-block-header { background-color: #2d2d2d; padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; color: #dcdcdc; font-size: 12px; font-weight: 600; border-bottom: 1px solid #1e1e1e; }
        .copy-code-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; color: #aaaaaa; border-radius: 4px; }
        .copy-code-btn:hover { background-color: rgba(255,255,255,0.08); color: #ffffff; }
        .copy-code-btn svg { fill: currentColor; }
        .ai-message pre { margin: 0; background-color: transparent; padding: 12px; overflow-x: auto; }
        .ai-message pre code { background-color: transparent; color: #dcdcdc; padding: 0; font-size: 0.85em; display: block; white-space: pre; }

        .ai-message .table-container { width: 100%; overflow-x: auto; margin: 12px 0; border-radius: 8px; border: 1px solid #e1e8ed; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .ai-message table { width: 100%; border-collapse: collapse; font-size: 13.5px; background-color: #ffffff; text-align: left; }
        .ai-message th, .ai-message td { padding: 8px 12px; border: 1px solid #e1e8ed; white-space: nowrap; }
        .ai-message th { background-color: #f8f9fa; font-weight: 600; color: #14171a; border-bottom: 2px solid #e1e8ed; }
        .ai-message tr:nth-child(even) { background-color: #f9f9fa; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <span class="chat-header-title">AI Chat Game</span>
        <span id="modelIndicator" class="model-badge">---</span>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message ai-message">Hello! I am your assistant. How can I help you today?</div>
    </div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    // 🔍 COMPROBACIÓN INMEDIATA DEL MODO EMBED
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('embed')) {
        document.body.classList.add('embed-mode');
    }

    const BASE64_KEYS = {
        "gemini-2.5-flash": "QVEuQWI4Uk42SkxFdVpwRzdibHFDSFNPYWJFNGhEMmU0YzBxV2k2TV9iQThnUVhUTml3UVE=",
        "gemini-2.5-flash-lite": "QVEuQWI4Uk42SmQ3cGV0STRuN2tBMDkycXA1V0dQWU1kbGV1bEFfZEVGSE54eHY3NzRxRXc="
    };

    let currentModel = "gemini-2.5-flash";
    let chatHistory = [];

    // CONTROLADOR DINÁMICO DE LA ETIQUETA DE MODELO
    function updateModelIndicator() {
        const indicator = document.getElementById("modelIndicator");
        if (!indicator) return;
       
        if (currentModel === "gemini-2.5-flash") {
            indicator.innerText = "⚡ Gemini 2.5 Flash";
            indicator.style.backgroundColor = "#dbeafe";
            indicator.style.color = "#1e40af";
        } else {
            indicator.innerText = "🪶 Gemini 2.5 Flash-Lite";
            indicator.style.backgroundColor = "#e5e7eb";
            indicator.style.color = "#374151";
        }
    }

    function copyCode(btn) {
        const container = btn.closest('.code-block-container');
        if (!container) return;
        const codeText = container.querySelector('pre code').innerText;
        navigator.clipboard.writeText(codeText).then(() => {
            const originalColor = btn.style.color;
            btn.style.color = "#10b981";
            setTimeout(() => { btn.style.color = originalColor; }, 1200);
        });
    }

    function parseMarkdown(text) {
        let lines = text.split('\n');
        let inList = false;
        let inCodeBlock = false;
        let inTable = false;
        let codeContent = [];
        let codeLang = '';
        let htmlResult = [];

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            let cleanLine = line.trim();

            if (inCodeBlock) {
                if (cleanLine.startsWith('```')) {
                    inCodeBlock = false;
                    let escapedCode = codeContent.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    let displayLang = codeLang ? codeLang.toUpperCase() : 'CODE';
                    htmlResult.push(`
                        <div class="code-block-container">
                            <div class="code-block-header">
                                <span>${displayLang}</span>
                                <button class="copy-code-btn" onclick="copyCode(this)" title="Copy Code">
                                    <svg viewBox="0 0 24 24" width="16" height="16"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                                </button>
                            </div>
                            <pre><code class="language-${codeLang}">${escapedCode}</code></pre>
                        </div>
                    `);
                    codeContent = [];
                } else {
                    codeContent.push(line);
                }
                continue;
            }

            if (cleanLine.startsWith('```')) {
                inCodeBlock = true;
                codeLang = cleanLine.substring(3).trim();
                if (inList) { htmlResult.push('</ul>'); inList = false; }
                if (inTable) { htmlResult.push('</tbody></table></div>'); inTable = false; }
                continue;
            }

            if (cleanLine.startsWith('|')) {
                if (inList) { htmlResult.push('</ul>'); inList = false; }
                if (/^[|:\-\s]+$/.test(cleanLine)) continue;

                let cells = line.split('|').map(c => c.trim());
                if (cells[0] === '') cells.shift();
                if (cells[cells.length - 1] === '') cells.pop();

                if (!inTable) {
                    inTable = true;
                    htmlResult.push('<div class="table-container"><table><thead><tr>');
                    cells.forEach(cell => { htmlResult.push(`<th>${formatInlineMarkdown(cell)}</th>`); });
                    htmlResult.push('</tr></thead><tbody>');
                } else {
                    htmlResult.push('<tr>');
                    cells.forEach(cell => { htmlResult.push(`<td>${formatInlineMarkdown(cell)}</td>`); });
                    htmlResult.push('</tr>');
                }
                continue;
            } else {
                if (inTable) { htmlResult.push('</tbody></table></div>'); inTable = false; }
            }

            if (cleanLine.startsWith('###### ')) {
                if (inList) { htmlResult.push('</ul>'); inList = false; }
                htmlResult.push(`<h6>${formatInlineMarkdown(cleanLine.substring(7))}</h6>`);
            } else if (cleanLine.startsWith('##### ')) {
                if (inList) { htmlResult.push('</ul>'); inList = false; }
                htmlResult.push(`<h5>${formatInlineMarkdown(cleanLine.substring(6))}</h5>`);
            } else if (cleanLine.startsWith('#### ')) {
                if (inList) { htmlResult.push('</ul>'); inList = false; }
                htmlResult.push(`<h4>${formatInlineMarkdown(cleanLine.substring(5))}</h4>`);
            } else if (cleanLine.startsWith('### ')) {
                if (inList) { htmlResult.push('</ul>'); inList = false; }
                htmlResult.push(`<h3>${formatInlineMarkdown(cleanLine.substring(4))}</h3>`);
            } else if (cleanLine.startsWith('## ')) {
                if (inList) { htmlResult.push('</ul>'); inList = false; }
                htmlResult.push(`<h2>${formatInlineMarkdown(cleanLine.substring(3))}</h2>`);
            } else if (cleanLine.startsWith('# ')) {
                if (inList) { htmlResult.push('</ul>'); inList = false; }
                htmlResult.push(`<h1>${formatInlineMarkdown(cleanLine.substring(2))}</h1>`);
            } else if (cleanLine.startsWith('* ') || cleanLine.startsWith('- ')) {
                if (!inList) { htmlResult.push('<ul>'); inList = true; }
                htmlResult.push(`<li>${formatInlineMarkdown(cleanLine.substring(2))}</li>`);
            } else {
                if (inList) { htmlResult.push('</ul>'); inList = false; }
                if (cleanLine !== '') htmlResult.push(`<p>${formatInlineMarkdown(cleanLine)}</p>`);
            }
        }

        if (inList) htmlResult.push('</ul>');
        if (inTable) htmlResult.push('</tbody></table></div>');
        if (inCodeBlock) {
            let escapedCode = codeContent.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            htmlResult.push(`<div class="code-block-container"><pre><code>${escapedCode}</code></pre></div>`);
        }
        return htmlResult.join('');
    }

    function formatInlineMarkdown(text) {
        let formatted = text;
        formatted = formatted.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" class="chat-img">');
        formatted = formatted.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" class="chat-link">$1</a>');
        formatted = formatted.replace(/`(.*?)`/g, '<code>$1</code>');
        formatted = formatted.replace(/~~(.*?)~~/g, '<del>$1</del>');
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        formatted = formatted.replace(/__(.*?)__/g, '<strong>$1</strong>');
        formatted = formatted.replace(/\*\((.*?)\*/g, '<em>$1</em>');
        formatted = formatted.replace(/_(.*?)_/g, '<em>$1</em>');
        return formatted;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }

    async function sendMessage() {
        const inputField = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const userText = inputField.value.trim();

        if (userText === "") return;

        chatBox.innerHTML += `<div class="message user-message">${userText}</div>`;
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        chatHistory.push({
            role: "user",
            parts: [{ text: userText }]
        });

        await requestAIResponse();
    }

    async function requestAIResponse() {
        const chatBox = document.getElementById("chatBox");
        const base64Key = BASE64_KEYS[currentModel];
       
        const loadingId = "loading-" + Date.now();
        chatBox.innerHTML += `<div id="${loadingId}" class="message ai-message" style="color: #8899a6;"><em>Thinking...</em></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const decryptedApiKey = atob(base64Key);

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${decryptedApiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    systemInstruction: {
                        parts: [{ text: "You are an expert, helpful, and direct assistant. Always use clear formatting like short paragraphs, bullet points, and bold text, and maintain a polite tone. If you lack accurate information, simply state that you do not have that data. Adapt to the user's language." }]
                    },
                    contents: chatHistory
                })
            });

            const data = await response.json();
           
            const loadingEl = document.getElementById(loadingId);
            if (loadingEl) loadingEl.remove();

            if (response.ok) {
                let aiResponse = data.candidates[0].content.parts[0].text;
               
                // 🛡️ ESCUDO ANTI-BUCLE JAVASCRIPT
                const frases = aiResponse.split(/[.:\n]/);
                for (let f of frases) {
                    let cleanF = f.trim();
                    if (cleanF.length > 15 && aiResponse.split(cleanF).length > 3) {
                        aiResponse = cleanF + ". *[Bucle infinito de identidad detectado y bloqueado por seguridad]*";
                        break;
                    }
                }

                const formattedResponse = parseMarkdown(aiResponse);
                chatBox.innerHTML += `<div class="message ai-message">${formattedResponse}</div>`;
               
                chatHistory.push({
                    role: "model",
                    parts: [{ text: aiResponse }]
                });

            } else if (response.status === 429 && currentModel === "gemini-2.5-flash") {
                currentModel = "gemini-2.5-flash-lite";
                updateModelIndicator();
                await requestAIResponse();
               
            } else {
                chatHistory.pop();
                const errorMsg = data.error ? data.error.message : "Unknown error";
                chatBox.innerHTML += `<div class="message system-message">Error: ${errorMsg}</div>`;
            }
        } catch (error) {
            const loadingEl = document.getElementById(loadingId);
            if (loadingEl) loadingEl.remove();
            chatHistory.pop();
            chatBox.innerHTML += `<div class="message system-message">Error: Request failed.</div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 🚀 Inicialización del indicador al cargar la app
    updateModelIndicator();
</script>
</body>
</html>
